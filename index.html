<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>deillusionist</title>
  <style>
    @font-face {
      font-family: "Futura Portfolio";
      src: url("fonts/FuturaPT-LightObl.ttf") format("truetype");
      font-weight: 300;
      font-style: oblique;
      font-display: swap;
    }

    :root {
      --paper: #e3e3e0;
      --ink: #111111;
      --muted: #5c5c5a;
      --line: rgba(17, 17, 17, 0.55);
      --modal: rgba(227, 227, 224, 0.94);
      --font: "Futura Portfolio", Futura, "Trebuchet MS", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background-color: var(--paper);
      color: var(--ink);
      font-family: var(--font);
      font-weight: 300;
      font-style: oblique;
      letter-spacing: 0.035em;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;

      background-image: url("assets/paper-texture.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      opacity: 1;
    }

    

    a { color: inherit; text-decoration: none; }

    .site-header {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0 124px;
      text-align: center;
      line-height: 0;
    }

    .logo {
      width: min(320px, 58vw);
      height: auto;
      display: block;
      margin: 0 auto;
      padding: 0;
    }

    main {
      padding-top: 0;
      width: min(1180px, calc(100% - 34px));
      margin: 0 auto;
    }

    .gallery-section {
      padding-bottom: clamp(46px, 7vw, 84px);
    }

    .gallery-section:first-child {
      padding-top: 0;
    }

    .section-title {
      margin: 0 0 10px;
      padding-top: 0;
      font-size: clamp(16px, 1.7vw, 26px);
      line-height: 0.95;
      text-transform: uppercase;
      font-weight: 300;
      letter-spacing: 0.015em;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .photo-card {
      display: block;
      width: 100%;
      margin: 0 0 10px;
      padding: 0;
      
      cursor: zoom-in;
      line-height: 0;
      border: 1px solid var(--line);
      background: transparent;
      transition: transform 220ms ease, border-color 220ms ease, opacity 220ms ease;
    }

    .photo-card:hover {
      transform: translateY(-3px);
      border-color: var(--ink);
      opacity: 0.88;
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }
.photo-card img {
      transition: filter 220ms ease, opacity 220ms ease, transform 220ms ease;
    }


    .gallery-section .photo-card img {
      transition: filter 320ms ease, opacity 320ms ease;
    }

    .gallery-section:not(.is-active) .photo-card img {
      filter: grayscale(1);
      opacity: 1;
    }

    .gallery-section.is-active .photo-card img {
      filter: saturate(1) grayscale(0);
      opacity: 1;
    }

    .site-footer {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 8px 0 68px;
      display: flex;
      justify-content: flex-start;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .site-footer a { color: var(--ink); }
    .site-footer a:hover { opacity: 0.62; }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(18px, 4vw, 56px);
      background: rgba(227, 227, 224, 0.62);
      backdrop-filter: blur(22px) saturate(0.68);
      -webkit-backdrop-filter: blur(22px) saturate(0.68);
    }


    .lightbox-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      border: 0 !important;
      background: transparent !important;
      color: transparent !important;
      padding: 0 !important;
      cursor: zoom-out;
      appearance: none;
      -webkit-appearance: none;
    }

    .lightbox-backdrop:hover,
    .lightbox-backdrop:focus,
    .lightbox-backdrop:active {
      background: transparent !important;
      color: transparent !important;
      outline: none;
    }

    .lightbox.is-open {
      display: flex;
    }

    .lightbox-frame {
      position: relative;
      z-index: 1;
      width: fit-content;
      max-width: min(96vw, 1500px);
      max-height: 94vh;
      background: transparent;
      border: 0;
      padding: 0;
      display: grid;
      grid-template-rows: minmax(0, auto) auto;
      gap: 14px;
      pointer-events: none;
    }

    .lightbox-image-wrap {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-columns: 44px minmax(0, auto) 44px;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: auto;
    }

    .lightbox-nav {
      position: static;
      transform: none;
      z-index: 3;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 0;
      background: rgba(227, 227, 224, 0.78);
      color: var(--ink);
      font: inherit;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: auto;
      appearance: none;
      -webkit-appearance: none;
    }

    .lightbox-prev {
      justify-self: end;
    }

    .lightbox-next {
      justify-self: start;
    }

    .lightbox-nav:hover,
    .lightbox-nav:focus {
      background: var(--ink);
      color: var(--paper);
      outline: none;
    }

    .lightbox img {
      display: block;
      max-width: 100%;
      max-height: calc(94vh - 62px);
      object-fit: contain;
      border: 0;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.18);
    }

    .lightbox-actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      text-transform: uppercase;
      pointer-events: auto;
    }

    .lightbox-actions-left,
    .lightbox-actions-right {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .lightbox-actions button,
    .lightbox-actions a {
      appearance: none;
      border: 0;
      background: rgba(227, 227, 224, 0.72);
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      text-transform: uppercase;
      padding: 7px 10px;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .lightbox-actions button:hover,
    .lightbox-actions a:hover,
    .lightbox-nav:hover {
      background: var(--ink);
      color: var(--paper);
    }

    .image-name {
      display: none;
    }

    @media (max-width: 1050px) {
      .gallery {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
    }
      .photo-card { margin-bottom: 22px; }
    }

    @media (max-width: 720px) {
      .site-header {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0 124px;
      text-align: center;
      line-height: 0;
    }

      main,
.photo-card img {
      transition: filter 220ms ease, opacity 220ms ease, transform 220ms ease;
    }


    .gallery-section .photo-card img {
      transition: filter 320ms ease, opacity 320ms ease;
    }

    .gallery-section:not(.is-active) .photo-card img {
      filter: grayscale(1);
      opacity: 1;
    }

    .gallery-section.is-active .photo-card img {
      filter: saturate(1) grayscale(0);
      opacity: 1;
    }

    .site-footer {
        width: min(100% - 18px, 1180px);
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .photo-card {
        padding: 2px;
        margin-bottom: 0;
      }
    }
      main, .site-footer { width: min(100% - 28px, 1180px); }
      .gallery { column-count: 2; column-gap: 14px; }
      .photo-card { margin-bottom: 14px; }
      .section-title {
      margin: 0 0 10px;
      padding-top: 0;
      font-size: clamp(16px, 1.7vw, 26px);
      line-height: 0.95;
      text-transform: uppercase;
      font-weight: 300;
      letter-spacing: 0.015em;
    }
    }

    @media (max-width: 420px) {
      .gallery { column-count: 1; }
      .lightbox-actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      text-transform: uppercase;
      pointer-events: auto;
    }
      .lightbox-actions-left,
      .lightbox-actions-right,
      .lightbox-actions a,
      .lightbox-actions button { width: 100%; justify-content: center; text-align: center; }

      .lightbox-nav {
      position: static;
      transform: none;
      z-index: 3;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 0;
      background: rgba(227, 227, 224, 0.78);
      color: var(--ink);
      font: inherit;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: auto;
      appearance: none;
      -webkit-appearance: none;
    }

      .lightbox-prev {
      justify-self: end;
    }

      .lightbox-next {
      justify-self: start;
    }
    }
  </style>
</head>

    const lightbox = document.querySelector("#lightbox");
    const lightboxFrame = document.querySelector(".lightbox-frame");
    const lightboxImage = document.querySelector("#lightbox-image");
    const openOriginal = document.querySelector("#open-original");
    const downloadImage = document.querySelector("#download-image");
    const closeLightbox = document.querySelector("#close-lightbox");
    const lightboxBackdrop = document.querySelector("#lightbox-backdrop");
    const prevImage = document.querySelector("#prev-image");
    const nextImage = document.querySelector("#next-image");

    const photoCards = Array.from(document.querySelectorAll(".photo-card"));
    let currentImageIndex = 0;

    function updateLightbox(index) {
      currentImageIndex = (index + photoCards.length) % photoCards.length;

      const card = photoCards[currentImageIndex];
      const src = card.dataset.full;
      const img = card.querySelector("img");

      lightboxImage.src = src;
      lightboxImage.alt = img.alt || "Expanded portfolio image";
      openOriginal.href = src;
      downloadImage.href = src;
      downloadImage.setAttribute("download", src.split("/").pop());
    }

    function openLightbox(index) {
      updateLightbox(index);
      lightbox.classList.add("is-open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      lightboxImage.src = "";
    }

    photoCards.forEach((card, index) => {
      card.addEventListener("click", () => {
        openLightbox(index);
      });
    });

    prevImage.addEventListener("click", (event) => {
      event.stopPropagation();
      updateLightbox(currentImageIndex - 1);
    });

    nextImage.addEventListener("click", (event) => {
      event.stopPropagation();
      updateLightbox(currentImageIndex + 1);
    });

    closeLightbox.addEventListener("click", closeModal);

    lightboxBackdrop.addEventListener("click", closeModal);

    document.addEventListener("keydown", (event) => {
      if (!lightbox.classList.contains("is-open")) return;

      if (event.key === "Escape") closeModal();
      if (event.key === "ArrowLeft") updateLightbox(currentImageIndex - 1);
      if (event.key === "ArrowRight") updateLightbox(currentImageIndex + 1);
    });

    const sections = Array.from(document.querySelectorAll(".gallery-section"));

    function setActiveSection() {
      const focusLine = window.innerHeight * 0.28;
      let activeSection = sections[0];

      sections.forEach((section) => {
        const rect = section.getBoundingClientRect();

        if (rect.top <= focusLine && rect.bottom >= focusLine) {
          activeSection = section;
        }
      });

      sections.forEach((section) => {
        section.classList.toggle("is-active", section === activeSection);
      });
    }

    setActiveSection();
    window.addEventListener("scroll", setActiveSection, { passive: true });
    window.addEventListener("resize", setActiveSection);
  </script>
</body>
</html>
